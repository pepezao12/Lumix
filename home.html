<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/1496d6dab9.js" crossorigin="anonymous"></script>         
    <!-- ✅ Removido script CDN global — usamos import ESM em home.js -->
    <script type="module" src="home.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Lumix</title>
    <link rel="icon" href="data:,">
</head>
<body class="home">

    <div id="global-loading">
        <div class="spinner"></div>
    </div>

    <nav>
        <div class="logo">
            <button id="logo" class="logo">Lumix</button>
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="game.html">Games</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
        </ul>

        <div id="btns">
            <button id="loginBtn" class="btns">Login</button>
            <button id="userBtn" hidden>
                <i class="fa-solid fa-user"></i>
            </button>
        </div>

        <div id="userMenu" >
            <p id="helloUser">Olá</p>
            <a href="profile.html" class="profile-link">Perfil</a>
            <div id="club-info" style="display: none;">
                <a href="clubs.html" class="club-link">
                    <span id="club-badge"></span>
                    <span id="club-name"></span>
                </a>
            </div>

            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div id="dashboard">
        <h1 id="welcome-msg"></h1>
        <div class="stats-grid">
            <div class="stat-card">
                <p>Pontuação Total</p>
                <h2 id="stat-total-score"></h2>
            </div>
            <div class="stat-card">
                <p>Desafios Completos</p>
                <h2 id="stat-challenges"></h2>
            </div>
            <div class="stat-card">
                <p>Streak 🔥</p>
                <h2 id="stat-streak"></h2>
            </div>
        </div>

        <div id="today-card">
            <h3>Desafio de Hoje</h3>
            <p id="today-status"></p>
            <button id="play-btn">Jogar Agora</button>
            <p id="today-countdown"></p>
        </div>

        <div id="top3-section">
            <h3>🏆 Top Jogadores</h3>
            <div id="top3-list"></div>
        </div>

        <div id="how-to-play">
            <h3>Como Jogar</h3>

            <div class="how-grid">

                <div class="how-card">
                    <h4>🧠 Quiz</h4>
                    <p></p>
                </div>

                <div class="how-card">
                    <h4>🟩 Wordle</h4>
                    <p></p>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
