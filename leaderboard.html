<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/1496d6dab9.js" crossorigin="anonymous"></script>
    <script type="module" src="leaderboard.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Lumix - Leaderboard</title>
</head>
<body>

    <div id="global-loading">
        <div class="spinner"></div>
    </div>

    <nav>
        <div class="logo">
            <button id="logo" class="logo">Lumix</button>
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="game.html">Games</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
        </ul>
        <div id="btns">
            <button id="loginBtn" class="btns">Login</button>
            <button id="userBtn" hidden>
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div id="userMenu">
            <p id="helloUser">Olá</p>
            <div id="club-info" style="display: none;">
                <a href="clubs.html" class="club-link">
                    <span id="club-badge"></span>
                    <span id="club-name"></span>
                </a>
            </div>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <h1 class="leaderboard-title">Leaderboard</h1>

    <div id="filters">
        <button id="filter-all">All time</button>
        <button id="filter-week">Esta semana</button>
        <button id="filter-today">Hoje</button>
    </div>

    <div id="leaderboard-container">
        <table id="leaderboard-table" class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Jogador</th>
                    <th id="sort-score" style="cursor: pointer;">Pontuação Total<span id="arrow-score">▼</span></th>
                    <th id="sort-games" style="cursor: pointer;">Desafios Completados<span id="arrow-games"></span></th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>
    <div id="user-position-bar" style="display: none;">
        <span id="user-position-text"></span>
    </div>
    <div id="leaderboard-loading">Loading...</div>
    <div id="leaderboard-empty" style="display:none">Ainda não há pontuações registadas.</div>
</body>
</html>
